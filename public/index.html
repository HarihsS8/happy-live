<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Live Streaming</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 20px;
    }
    video {
      width: 80%;
      max-width: 640px;
      border: 1px solid #ccc;
      margin: 10px;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #controls {
      margin-top: 20px;
    }
    #locationStatus {
      font-size: 14px;
      color: #666;
      margin: 10px 0;
    }
    .location-ok {
      color: green;
    }
    .location-error {
      color: red;
    }
  </style>
</head>
<body>
  <h1>Happy Live Streaming</h1>
  <div id="controls">
    <button id="getLocation">Get My Location</button>
    <p id="locationStatus">Location: Not detected</p>
    <button id="startBroadcast" disabled>Start Broadcasting</button>
    <button id="stopBroadcast" disabled>Stop Broadcasting</button>
    <button id="joinStream" disabled>Join Stream</button>
  </div>
  <div id="videoContainer">
    <video id="localVideo" autoplay muted></video>
    <video id="remoteVideo" autoplay></video>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
